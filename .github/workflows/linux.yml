name: Build Linux

on:
    push:
        # branches: [ "master" ]
    pull_request:
        branches: ["master"]

jobs:
    build:
        runs-on: ubuntu-latest

        permissions:
            packages: write

        steps:
            - uses: actions/checkout@v6

            - name: Run build
              run: |
                  ./tools/linux/build-in-docker
              env:
                  CI: 1

            - name: Extract artifact from Docker image
              run: |
                  ./tools/linux/extract-from-docker
                  cd casparcg_server && zip -r ../casparcg_server.zip .

            - name: Rename build
              id: "rename-build"
              shell: bash
              run: |
                  TARGET=casparcg-server-${{ github.sha }}-linux.zip
                  mv casparcg_server.zip "$TARGET"

                  echo "artifactname=$TARGET" >> $GITHUB_OUTPUT

                  # check if a release branch, or master
                  if [[ "${{ github.ref_name }}" == "master" ]]
                  then
                    if [ -n "${{ secrets.SFTP_PASSWORD }}" ]
                    then
                        echo "uploadname=$TARGET" >> $GITHUB_OUTPUT
                    fi
                  fi

            - uses: actions/upload-artifact@v7
              with:
                  path: ${{ steps.rename-build.outputs.artifactname }}
                  archive: false

            - name: Copy single file to remote
              uses: garygrossgarten/github-action-scp@0.10.0
              if: ${{ steps.rename-build.outputs.uploadname }}
              timeout-minutes: 5
              with:
                  local: "${{ steps.rename-build.outputs.uploadname }}"
                  remote: "${{ secrets.SFTP_ROOT }}/${{ github.ref_name }}/${{ steps.rename-build.outputs.uploadname }}"
                  host: ${{ secrets.SFTP_HOST }}
                  username: ${{ secrets.SFTP_USERNAME }}
                  password: ${{ secrets.SFTP_PASSWORD }}
